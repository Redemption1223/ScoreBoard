<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="grid-bg"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="title">
                <div class="trophy">🏆</div>
                <div>
                    <h1>BASKETBALL</h1>
                    <p class="period">Period <span id="period">1</span></p>
                </div>
            </div>

            <div class="timer-box">
                <div class="timer" id="timer">12:00</div>
            </div>

            <div class="controls">
                <button onclick="playPause()" class="control-btn" id="playPause">▶</button>
                <button onClick="undo()" class="control-btn" id="undo">↶</button>
                <button onclick="resetTimer()" class="control-btn" id="reset">⟲</button>
            </div>
        </div>

        <!-- Scoreboard -->
        <div class="scoreboard">
            <!-- Home Team -->
            <div class="team-card" id="homeCard">
                <div class="team-header">
                    <h2 class="team-name">HOME</h2>
                    <div class="possession" id="homePossession">POSSESSION</div>
                </div>
                <div class="score-display">
                    <div class="score home-score" id="homeScore">00</div>
                    <div class="score-glow home-glow"></div>
                </div>
                <div class="score-buttons">
                    <button onclick="addOne()" class="score-btn home-btn" data-team="home" data-points="1">+1</button>
                    <button onclick="addTwo()" class="score-btn home-btn" data-team="home" data-points="2">+2</button>
                    <button onclick="addThree()" class="score-btn home-btn" data-team="home" data-points="3">+3</button>
                </div>
            </div>

            <!-- Guest Team -->
            <div class="team-card" id="guestCard">
                <div class="team-header">
                    <h2 class="team-name">GUEST</h2>
                    <div class="possession" id="guestPossession">POSSESSION</div>
                </div>
                <div class="score-display">
                    <div class="score guest-score" id="guestScore">00</div>
                    <div class="score-glow guest-glow"></div>
                </div>
                <div class="score-buttons">
                    <button onclick="addOneG()" class="score-btn guest-btn" data-team="guest" data-points="1">+1</button>
                    <button onclick="addTwoG()" class="score-btn guest-btn" data-team="guest" data-points="2">+2</button>
                    <button onclick="addThreeG()" class="score-btn guest-btn" data-team="guest" data-points="3">+3</button>
                </div>
            </div>
        </div>

        <!-- Bottom Actions -->
        <div class="bottom-actions">
            <button onclick="nextPeriod()" class="action-btn primary" id="nextPeriod">Next Period</button>
            <button onclick="switchPositions()" class="action-btn secondary" id="switchPossession">Switch Possession</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
